<html data-layout="/layout/classic.html"
    data-title="Login"
    data-description="Login to Dealercrest">

<div data-slot="body">
  <section class="auth-section">
    <div class="auth-copy">
      <div class="eyebrow">Dealer Portal</div>
      <h1>Welcome back.</h1>
      <p>Manage your website, leads, calls, chat conversations, campaigns, and CRM pipeline from one workspace.</p>
    </div>

    <div class="auth-card">
      <h2>Login</h2>
      <p>Access your Dealercrest account.</p>
      <form class="form-grid">
        <div class="field full">
          <label for="loginEmail">Email</label>
          <input id="loginEmail" type="email" placeholder="you@dealership.com">
        </div>
        <div class="field full">
          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" placeholder="Password">
        </div>
        <div class="field full">
          <button class="btn btn-blue auth-submit" type="button">Login</button>
        </div>
      </form>
      <div class="auth-note">
        New to Dealercrest?<a href="register" style="margin-left:10px;">Create a website</a>
      </div>
    </div>
  </section>
</div>

</html>

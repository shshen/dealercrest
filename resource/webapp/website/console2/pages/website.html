  const cards=PAGES_DATA.map(page=>`
    <div class="pgc">
      <div class="pgp"><div class="pl h"></div><div style="height:3px"></div><div class="pl"></div><div class="pl m"></div><div class="pl sm"></div><div style="height:5px"></div><div class="pl"></div><div class="pl m"></div></div>

function bindWebsite(){}
function refreshWebsitePage(){
  const ct=document.getElementById('main-ct');
  if(ct) ct.innerHTML=renderWebsite();
}
function deletePage(id){
  const page=PAGES_DATA.find(p=>p.id===id);
  if(!page) return;
  openModal('Delete Page',
    `<div style="text-align:center;padding:10px 0">
      <div style="width:48px;height:48px;border-radius:50%;background:rgba(255,82,114,.12);color:var(--red);display:flex;align-items:center;justify-content:center;margin:0 auto 14px">${svgIcon('trash',22)}</div>
      <div style="font-size:15px;font-weight:600;margin-bottom:8px">Delete "${page.name}"?</div>
      <div style="font-size:13px;color:var(--tx2)">This will permanently remove the page at <strong>${page.url}</strong>. This action cannot be undone.</div>
    </div>`,
    ()=>{ PAGES_DATA=PAGES_DATA.filter(p=>p.id!==id); closeModal(); refreshWebsitePage(); showToast('Page deleted.','var(--red)'); },
    'Delete Page'
  );
  // Make delete button red
  setTimeout(()=>{
    const f=document.getElementById('modal-footer');
    if(f){ const b=f.querySelector('.btn-p'); if(b){b.style.background='var(--red)';b.style.boxShadow='0 0 16px rgba(255,82,114,.3)';}}
  },30);
}
function openNewPageModal(){
  openModal('New Page',`<div style="display:flex;flex-direction:column;gap:11px"><div class="fc2"><div class="fl">Page Name</div><input class="inp" id="f-pname" placeholder="e.g. About Us"/></div><div class="fc2"><div class="fl">URL Slug</div><input class="inp" id="f-purl" placeholder="/about"/></div><div class="fc2"><div class="fl">Status</div><select class="inp" id="f-pstatus"><option>Draft</option><option>Published</option></select></div></div>`,
    ()=>{const np={id:Date.now(),name:document.getElementById('f-pname').value||'Untitled',url:document.getElementById('f-purl').value||'/',status:document.getElementById('f-pstatus').value,views:0,edited:'Just now'};PAGES_DATA.push(np);closeModal();refreshWebsitePage();setTimeout(()=>openBuilder(np.id),80);},'Create & Edit');
}

/* ── Extra functions for this page ── */

function getDefaultProps(type, varIdx){
  const defs=BLOCK_DEFS[type];
  if(!defs) return {};
  return JSON.parse(JSON.stringify(defs[Math.min(varIdx,defs.length-1)]||defs[0]));
}

/* ─ Builder open/close ─ */
function openBuilder(pageId){
  const page=PAGES_DATA.find(p=>p.id===pageId);
  if(!page) return;
  builderPageId=pageId;
  builderActive=true;
  document.getElementById('main-ct').style.display='none';
  const bl=document.getElementById('page-builder');
  bl.style.display='flex';
  bl.classList.add('active');
  _blUserCollapsedLeft=false; _blUserCollapsedRight=false; _initBuilderResizeObserver();
  document.getElementById('bl-pagename').value=page.name;
  document.getElementById('bl-bar-url').textContent=page.url;
  document.getElementById('page-title').textContent='Builder - '+page.name;
  canvasEls=[];selectedElId=null;tmplMode=null;
  buildBlockLibraryUI();
  renderCanvas();
  renderPropsEmpty();
  updatePanelState();
}
let _blResizeObserver = null;
function _initBuilderResizeObserver(){
  if(_blResizeObserver) _blResizeObserver.disconnect();
  const bl = document.getElementById('page-builder');
  if(!bl || !window.ResizeObserver) return;
  let _lastCollapsed = null;
  _blResizeObserver = new ResizeObserver(entries=>{
    const w = entries[0].contentRect.width;
    const shouldCollapse = w < 900;
    const bothCollapsed = w < 640;
    if(shouldCollapse === _lastCollapsed) return;
    _lastCollapsed = shouldCollapse;
    if(shouldCollapse){
      // collapse both panels
      document.getElementById('bl-left-panel').classList.add('collapsed');
      document.getElementById('bl-right-panel').classList.add('collapsed');
      updatePanelState();
    } else {
      // restore both panels only if user hasn't manually toggled
      if(!_blUserCollapsedLeft)  document.getElementById('bl-left-panel').classList.remove('collapsed');
      if(!_blUserCollapsedRight) document.getElementById('bl-right-panel').classList.remove('collapsed');
      updatePanelState();
    }
  });
  _blResizeObserver.observe(bl);
}
// Track manual user collapses so we don't override them on resize
let _blUserCollapsedLeft  = false;
let _blUserCollapsedRight = false;
function closeBuilder(){
  if(_blResizeObserver){ _blResizeObserver.disconnect(); _blResizeObserver=null; }
  builderActive=false;
  const bl=document.getElementById('page-builder');
  bl.classList.remove('active');
  bl.style.display='none';
  document.getElementById('main-ct').style.display='';
  navigate('website');
}
function previewPage(){
  const page = PAGES_DATA.find(p=>p.id===builderPageId)||{};
  const pageName = page.name || 'Preview';
  // slug: e.g. "Home Page" -> "home-page"
  const slug = pageName.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
  const blocksHtml = canvasEls.map(el=>renderBlockHTML(el.type,el.variantIdx,el.props)).join('\n');
  const cbCss = (document.getElementById('cb-style')||{}).innerHTML||'';
  const html = `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>${pageName} — Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#fff}
${cbCss}
</style>
<${'script'}>
window.addEventListener('DOMContentLoaded',function(){
  try{
    if(location.origin&&location.origin!=='null'&&location.origin.startsWith('http')){
      history.replaceState(null,'','/${slug}/preview');
    }
  }catch(e){}
});
<\/script>
</head>
<body>
${blocksHtml}
</body>
</html>`;
  // Use Blob URL so the tab has a real URL we can rewrite
  const blob = new Blob([html], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const win = window.open(url, '_blank');
  if(!win){
    URL.revokeObjectURL(url);
    showToast('Pop-up blocked — please allow pop-ups for preview','var(--ora)');
    return;
  }
  // Revoke blob URL after tab has loaded (5s grace)
  setTimeout(()=>URL.revokeObjectURL(url), 5000);
}
function savePageFromBuilder(){
  const name=document.getElementById('bl-pagename').value;
  const page=PAGES_DATA.find(p=>p.id===builderPageId);
  if(page){page.name=name;page.status='Published';page.edited='Just now';}
  showToast('Page saved & published!');
}

/* ─ Panel toggle ─ */
function toggleLeftPanel(){
  _blUserCollapsedLeft = !document.getElementById('bl-left-panel').classList.contains('collapsed');
  leftPanelOpen=!leftPanelOpen;
  updatePanelState();
}
function toggleRightPanel(){
  _blUserCollapsedRight = !document.getElementById('bl-right-panel').classList.contains('collapsed');
  rightPanelOpen=!rightPanelOpen;
  updatePanelState();
}
function updatePanelState(){
  const lp=document.getElementById('bl-left-panel');
  const rp=document.getElementById('bl-right-panel');
  if(lp) lp.classList.toggle('collapsed',!leftPanelOpen);
  if(rp) rp.classList.toggle('collapsed',!rightPanelOpen);
  // Update toggle button icons in bar
  const lBtn=document.getElementById('bl-toggle-left');
  const rBtn=document.getElementById('bl-toggle-right');
  if(lBtn) lBtn.innerHTML=leftPanelOpen?svgIcon('arrowL',18):svgIcon('arrowR',18);
  if(rBtn) rBtn.innerHTML=rightPanelOpen?svgIcon('arrowR',18):svgIcon('arrowL',18);
}

/* ─ Block library UI ─ */
function buildBlockLibraryUI(){
  const listEl=document.getElementById('bl-lib-list');
  if(!listEl) return;
  listEl.innerHTML=BLOCK_CATALOG.map(group=>`
    <div class="bl-block-group">
      <div class="bl-block-group-label">${group.group}</div>
      ${group.blocks.map(block=>`
        <div class="bl-block-item" onclick="openTmplPicker('${block.type}')">
          <div class="bl-block-ic">${svgIcon(block.icon,13)}</div>
          <div class="bl-block-label">${block.label}</div>
          <div class="bl-block-arrow">&#8250;</div>
        </div>`).join('')}
    </div>`).join('');
  renderBlockList();
}
function renderBlockList(){
  const libEl=document.getElementById('bl-lib-list');
  const tmplEl=document.getElementById('bl-tmpl-picker');
  if(!libEl||!tmplEl) return;
  if(tmplMode){
    libEl.style.display='none';
    tmplEl.style.display='flex';
    renderTemplatePicker(tmplMode);
  } else {
    libEl.style.display='block';
    tmplEl.style.display='none';
  }
}
function renderTemplatePicker(type){
  const el=document.getElementById('bl-tmpl-picker');
  if(!el) return;
  const catalog=BLOCK_CATALOG.flatMap(g=>g.blocks).find(b=>b.type===type);
  if(!catalog){el.innerHTML='';return;}
  const previews=TMPL_PREVIEWS[type]||[];
  const items=catalog.variants.map((v,i)=>{
    const previewHtml=previews[i]||'<div style="height:100%;display:flex;align-items:center;justify-content:center;color:#888;font-size:11px">'+v+'</div>';
    let evalHtml=previewHtml;
    try{ evalHtml=Function('"use strict";return `'+previewHtml+'`')(); }catch(e){ evalHtml=previewHtml; }
    return `<div class="tmpl-item" draggable="true"
      ondragstart="tmplDragStart('${type}',${i},event)"
      ondragend="tmplDragEnd()"
      onclick="tmplSelect(this)">
      <div class="tmpl-preview">${evalHtml}<div class="tmpl-drag-hint">&#x2197; drag to add</div></div>
      <div class="tmpl-label">${v}</div>
    </div>`;
  }).join('');
  el.innerHTML=`<div class="tmpl-picker-h">
    <button class="tmpl-back" onclick="closeTmplPicker()">${svgIcon('arrowL',11)} Blocks</button>
    <div class="tmpl-picker-title">${catalog.label}</div>
  </div>
  <div style="padding:6px 10px 4px;font-size:9px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em">Drag a variant onto the canvas</div>
  <div class="tmpl-list">${items}</div>`;
}
function openTmplPicker(type){tmplMode=type;renderBlockList();}
function closeTmplPicker(){tmplMode=null;renderBlockList();}

function tmplSelect(el){
  // Click just highlights the item — drag it to canvas to add
  document.querySelectorAll('.tmpl-item').forEach(i=>i.classList.remove('tmpl-selected'));
  el.classList.add('tmpl-selected');
}
function addBlockVariant(type,varIdx){
  const id='el-'+Date.now();
  // Insert after pending drop position, or append
  const newEl={id,type,variantIdx:varIdx,props:getDefaultProps(type,varIdx)};
  if(window._pendingInsertAfter!==undefined&&window._pendingInsertAfter!==null){
    const idx=canvasEls.findIndex(x=>x.id===window._pendingInsertAfter);
    if(idx>=0) canvasEls.splice(idx+1,0,newEl);
    else canvasEls.push(newEl);
    window._pendingInsertAfter=undefined;
  } else {
    canvasEls.push(newEl);
  }
  // Stay on template picker — do NOT reset tmplMode so user can keep adding variants
  renderCanvas();
  selectEl(id);
}

/* ─ Drag-drop from library ─ */
// dragBlockType: {type, variantIdx}
let _nearestZone=null;

function tmplDragStart(type,varIdx,e){
  dragBlockType={type,varIdx};
  e.dataTransfer.effectAllowed='copy';
  e.dataTransfer.setData('text/plain',type+':'+varIdx);
  // Attach mousemove tracker to canvas wrap during drag
  const wrap=document.getElementById('bl-canvas-wrap');
  if(wrap) wrap.addEventListener('dragover', _trackNearestZone);
}
function tmplDragEnd(){
  dragBlockType=null;
  _nearestZone=null;
  const wrap=document.getElementById('bl-canvas-wrap');
  if(wrap) wrap.removeEventListener('dragover', _trackNearestZone);
  document.querySelectorAll('.drop-zone').forEach(z=>{
    z.classList.remove('dz-visible');
    z.classList.remove('dz-over');
  });
}
function blDragStart(type,e){ /* parent blocks no longer draggable */ }
function blDragEnd(){ }

function _trackNearestZone(e){
  e.preventDefault();
  const zones=[...document.querySelectorAll('.drop-zone')];
  if(!zones.length) return;
  // Find zone whose vertical center is closest to cursor Y
  let best=null, bestDist=Infinity;
  zones.forEach(z=>{
    const r=z.getBoundingClientRect();
    const centerY=r.top+r.height/2;
    const dist=Math.abs(e.clientY-centerY);
    if(dist<bestDist){ bestDist=dist; best=z; }
  });
  if(best===_nearestZone) return; // no change
  // Hide old, show new
  if(_nearestZone){
    _nearestZone.classList.remove('dz-visible');
    _nearestZone.classList.remove('dz-over');
  }
  _nearestZone=best;
  if(_nearestZone){
    _nearestZone.classList.add('dz-visible');
    _nearestZone.classList.add('dz-over');
  }
}

function dzOver(e,el){ e.preventDefault(); }
function dzLeave(el){ }
function dzDrop(e,afterId){
  e.preventDefault();
  document.querySelectorAll('.drop-zone').forEach(z=>{z.classList.remove('dz-over');z.classList.remove('dz-visible');});
  if(!dragBlockType) return;
  const {type,varIdx}=dragBlockType;
  dragBlockType=null;
  const id='el-'+Date.now();
  const newEl={id,type,variantIdx:varIdx,props:getDefaultProps(type,varIdx)};
  if(afterId===null){
    canvasEls.unshift(newEl);
  } else {
    const idx=canvasEls.findIndex(x=>x.id===afterId);
    canvasEls.splice(idx+1,0,newEl);
  }
  renderCanvas();
  selectEl(id);
}

function selectEl(id){
  selectedElId=id;
  renderCanvas();
  const el=canvasEls.find(e=>e.id===id);
  if(el) renderPropsPanel(el);
  if(!rightPanelOpen){rightPanelOpen=true;updatePanelState();}
}
function delEl(id,e){e.stopPropagation();canvasEls=canvasEls.filter(x=>x.id!==id);if(selectedElId===id){selectedElId=null;renderPropsEmpty();}renderCanvas();}
function dupEl(id,e){e.stopPropagation();const src=canvasEls.find(x=>x.id===id);if(!src)return;const clone={id:'el-'+Date.now(),type:src.type,variantIdx:src.variantIdx,props:JSON.parse(JSON.stringify(src.props))};const idx=canvasEls.findIndex(x=>x.id===id);canvasEls.splice(idx+1,0,clone);renderCanvas();}
function moveEl(id,dir,e){e.stopPropagation();const idx=canvasEls.findIndex(x=>x.id===id);const ni=idx+dir;if(ni<0||ni>=canvasEls.length)return;[canvasEls[idx],canvasEls[ni]]=[canvasEls[ni],canvasEls[idx]];renderCanvas();}

function setViewport(vp,el){
  document.querySelectorAll('.vp-btn').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
  const canvas=document.getElementById('bl-canvas');
  const wasEmpty=canvas.classList.contains('bl-canvas-empty');
  canvas.className='bl-canvas '+vp+(wasEmpty?' bl-canvas-empty':'');
  canvas.dataset.vp=vp;
  window._canvasVp=vp;
}

function renderPropsPanel(el){
  const body=document.getElementById('bl-props-body');
  if(!body) return;
  const fields=PROP_FIELDS[el.type]||[];
  const catalog=BLOCK_CATALOG.flatMap(g=>g.blocks).find(b=>b.type===el.type);
  let html=`<div style="font-size:11px;color:var(--acc);text-transform:uppercase;letter-spacing:.05em;font-weight:700;margin-bottom:4px">${el.type}</div>`;
  if(catalog) html+=`<div style="font-size:11px;color:var(--tx3);margin-bottom:14px">Variant: ${catalog.variants[el.variantIdx]||'Default'}</div>`;
  if(fields.length===0) html+='<div style="font-size:12px;color:var(--tx3)">No editable properties.</div>';
  fields.forEach(f=>{
    const val=el.props[f.k]??'';
    html+=`<div class="prop-row"><div class="prop-label">${f.l}</div>`;
    if(f.color){
      html+=`<input type="color" value="${val||'#ffffff'}" oninput="updateProp('${el.id}','${f.k}',this.value)"/>`;
    } else if(f.ta){
      html+=`<textarea oninput="updateProp('${el.id}','${f.k}',this.value)">${val}</textarea>`;
    } else {
      html+=`<input type="text" value="${val}" oninput="updateProp('${el.id}','${f.k}',this.value)"/>`;
    }
    html+='</div>';
  });
  body.innerHTML=html;
}
function renderPropsEmpty(){
  const body=document.getElementById('bl-props-body');
  if(body) body.innerHTML='<div class="no-sel">'+svgIcon('panels',24)+'<br/>Click a block on the canvas to edit its properties</div>';
}
function updateProp(elId,key,val){
  const el=canvasEls.find(e=>e.id===elId);
  if(!el) return;
  el.props[key]=val;
  const wrapper=document.getElementById('wrapper-'+elId);
  if(wrapper){
    const actBar=wrapper.querySelector('.bl-el-actions');
    wrapper.innerHTML='';
    if(actBar) wrapper.appendChild(actBar);
    const tmp=document.createElement('div');
    tmp.innerHTML=renderBlockHTML(el.type,el.variantIdx,el.props);
    while(tmp.firstChild) wrapper.appendChild(tmp.firstChild);
  }
}

function _veRender(car){
  const set=(id,val)=>{const el=document.getElementById(id);if(el)el.value=val||'';};
  set('ve-year',   car.year);
  set('ve-make',   car.make);
  set('ve-model',  car.model);
  set('ve-trim',   car.trim||'');
  set('ve-color',  car.color);
  set('ve-interior',car.interior||'');
  set('ve-vin',    car.vin);
  set('ve-price',  car.price);
  set('ve-msrp',   car.msrp||'');
  set('ve-mileage',car.mileage);
  set('ve-engine', car.engine||'');
  set('ve-mpg-city',car.mpgCity||'');
  set('ve-mpg-hwy',car.mpgHwy||'');
  set('ve-desc',   car.desc||'');
  set('ve-stock',  car.stock||'');
  set('ve-notes',  car.notes||'');
  const setSelect=(id,val)=>{const el=document.getElementById(id);if(el&&val){[...el.options].forEach((o,i)=>{if(o.value===val||o.text===val)el.selectedIndex=i;});}};
  setSelect('ve-status',    car.status||'Available');
  setSelect('ve-body',      car.body||'Sedan');
  setSelect('ve-transmission',car.transmission||'Automatic');
  setSelect('ve-drive',     car.drive||'FWD');
  setSelect('ve-fuel',      car.fuel||'Gasoline');
  setSelect('ve-condition', car.condition||'New');
  setSelect('ve-doors',     String(car.doors||4));
  setSelect('ve-seats',     String(car.seats||5));
  // Gallery
  _veRenderGallery();
  // Video
  document.getElementById('ve-video-label').textContent = veVideoUrl ? veVideoUrl.slice(0,36)+'…' : 'Add Video URL';
  // Tags
  _veRenderTags();
  // Quick-add chips
  const qw = document.getElementById('ve-quick-features');
  if(qw) qw.innerHTML = VE_QUICK.map(function(f){return '<span style="background:var(--b1);border:1px solid var(--b2);border-radius:4px;padding:3px 9px;font-size:10px;color:var(--tx3);cursor:pointer" onclick="veQuickAdd(this.dataset.f)" data-f="'+f+'" title="Add '+f+'">+ '+f+'</span>';}).join('');
}

function _veRenderGallery(){
  const el = document.getElementById('ve-gallery'); if(!el) return;
  el.innerHTML = vePhotos.map((url,i)=>{
    const filled = !!url;
    const isPrimary = i===0;
    return '<div class="ve-media-slot'+(filled?' filled':'')+(isPrimary&&filled?' primary':'')+'" onclick="veSetPhoto('+i+')">'
      +(filled
        ? '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:28px;background:var(--s3)">&#x1F5BC;</div>'
          +(isPrimary?'<div class="ve-slot-badge">Primary</div>':'')
          +'<div class="ve-slot-actions"><button style="background:var(--red);border:none;color:#fff;font-size:9px;padding:2px 5px;border-radius:3px;cursor:pointer" onclick="event.stopPropagation();veRemovePhoto('+i+')">✕</button></div>'
        : '<div class="ve-slot-emoji">'+(i===0?'&#x1F4F7;':'&#x2795;')+'</div>'
          +'<div class="ve-slot-label">'+(i===0?'Primary<br>Photo':'Photo '+(i+1))+'</div>')
      +'</div>';
  }).join('');
}

function veSetPhoto(idx){
  const url = prompt('Enter photo URL (or paste a direct image link):', vePhotos[idx]||'');
  if(url===null) return;
  vePhotos[idx] = url.trim();
  _veRenderGallery();
}
function veRemovePhoto(idx){ vePhotos[idx]=''; _veRenderGallery(); }

function veSetVideo(){
  const url = prompt('Enter video URL (YouTube, Vimeo, or direct):', veVideoUrl);
  if(url===null) return;
  veVideoUrl = url.trim();
  document.getElementById('ve-video-label').textContent = veVideoUrl ? veVideoUrl.slice(0,36)+'…' : 'Add Video URL';
}

function _veRenderTags(){
  const el=document.getElementById('ve-tags-wrap'); if(!el) return;
  el.innerHTML = veTags.map((t,i)=>'<span class="ve-tag">'+t+'<span class="ve-tag-x" onclick="veRemoveTag('+i+')">×</span></span>').join('');

  const inp=document.getElementById('ve-tag-input');

  if(val && !veTags.includes(val)){ veTags.push(val); _veRenderTags(); }
  inp.value='';
}

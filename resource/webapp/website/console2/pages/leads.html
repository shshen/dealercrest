<!-- pages/leads.html -->
<div class="ph" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
  <div>
    <h1>Leads & CRM</h1>
    <p>Manage prospects, pipeline and follow-ups</p>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <div style="display:flex;gap:6px">
      <div class="pill on" data-view="list"     onclick="setLeadsView('list')">List</div>
      <div class="pill"    data-view="pipeline" onclick="setLeadsView('pipeline')">Pipeline</div>
    </div>
    <button class="btn btn-p btn-sm" onclick="openAddLeadModal()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="margin-right:5px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Add Lead
    </button>
  </div>
</div>

<!-- Stats -->
<div class="sr" style="grid-template-columns:repeat(5,1fr)">
  <div class="sc"><div class="sc-l">Total Leads</div><div class="sc-v" id="lead-stat-total">—</div></div>
  <div class="sc"><div class="sc-l">Hot</div><div class="sc-v" style="color:var(--red)" id="lead-stat-hot">—</div></div>
  <div class="sc"><div class="sc-l">Warm</div><div class="sc-v" style="color:var(--ora)" id="lead-stat-warm">—</div></div>
  <div class="sc"><div class="sc-l">Cold</div><div class="sc-v" style="color:var(--blu)" id="lead-stat-cold">—</div></div>
  <div class="sc"><div class="sc-l">Tasks Due</div><div class="sc-v" style="color:var(--pur)" id="lead-stat-tasks">—</div></div>
</div>

<!-- Toolbar -->
<div style="display:flex;align-items:center;gap:9px;margin-bottom:14px;flex-wrap:wrap">
  <div class="tabs" style="flex:0;margin-bottom:0;border-bottom:none">
    <div class="tab on" data-status="All"  onclick="setLeadsStatus('All')">All</div>
    <div class="tab"    data-status="Hot"  onclick="setLeadsStatus('Hot')">Hot</div>
    <div class="tab"    data-status="Warm" onclick="setLeadsStatus('Warm')">Warm</div>
    <div class="tab"    data-status="Cold" onclick="setLeadsStatus('Cold')">Cold</div>
  </div>
  <div class="hd-srch">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="lead-search" placeholder="Search leads…" oninput="filterLeads()"/>
  </div>
</div>

<!-- Lead list / pipeline — JS fills this -->
<div id="leads-content">
  <div style="padding:30px;text-align:center;color:var(--tx3)">Loading…</div>
</div>

<style>
.lead-card {
  display: flex; align-items: center; gap: 13px;
  padding: 14px 16px; border-bottom: 1px solid var(--b1);
  cursor: pointer; transition: background .15s;
}
.lead-card:hover { background: var(--s2); }
.lead-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 13px; flex-shrink: 0;
}
.pipeline-col { flex: 1; min-width: 160px; }
.pipeline-card {
  background: var(--s2); border: 1px solid var(--b1); border-radius: 9px;
  padding: 12px; margin-bottom: 8px; cursor: pointer; transition: border-color .15s;
}
.pipeline-card:hover { border-color: var(--acc); }
</style>

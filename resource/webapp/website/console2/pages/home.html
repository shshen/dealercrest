<!-- pages/home.html -->
<div class="ph">
  <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
    <div style="width:7px;height:7px;border-radius:50%;background:var(--grn);box-shadow:0 0 8px var(--grn)"></div>
    <span style="font-size:12px;color:var(--tx3)">All systems operational</span>
  </div>
  <h1>Welcome back, Alex</h1>
  <p>Here's what's happening with your dealership today.</p>
</div>

<!-- KPI Stats -->
<div class="sr" id="home-stats">
  <div class="sc"><div class="sc-l">Vehicles</div><div class="sc-v" id="stat-vehicles">—</div><div class="sc-c">+12 this month</div></div>
  <div class="sc"><div class="sc-l">Active Leads</div><div class="sc-v" id="stat-leads">—</div><div class="sc-c">+8 this week</div></div>
  <div class="sc"><div class="sc-l">Monthly Rev</div><div class="sc-v">$1.2M</div><div class="sc-c">+18%</div></div>
  <div class="sc"><div class="sc-l">Resp. Time</div><div class="sc-v">4.2m</div><div class="sc-c">-1.1m avg</div></div>
  <div class="sc"><div class="sc-l">Visitors</div><div class="sc-v">14.9K</div><div class="sc-c">+32%</div></div>
</div>

<!-- Today's Tasks Widget -->
<div class="cs" style="margin-bottom:20px">
  <div class="cs-h" style="display:flex;align-items:center;justify-content:space-between">
    <div style="display:flex;align-items:center;gap:8px">
      <span id="task-widget-icon"></span>
      <h3>Today's Tasks</h3>
      <span id="overdue-badge" style="display:none;background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 7px;border-radius:10px"></span>
      <span id="today-badge" style="display:none;background:rgba(255,171,76,.2);color:var(--ora);font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px"></span>
    </div>
    <button class="btn btn-s btn-sm" onclick="navigate('tasks')">View All Tasks</button>
  </div>
  <div id="task-widget-body">
    <div style="padding:30px;text-align:center;color:var(--tx3)">Loading…</div>
  </div>
</div>

<!-- Feature Cards -->
<div class="fcg" id="feature-cards"></div>

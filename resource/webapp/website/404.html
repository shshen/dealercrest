<!DOCTYPE html>
<html lang="${lang}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Page not found</title>
<style>
#notfound {position: relative; height: 100vh; }
#notfound .notfound { position: absolute;left: 50%; top: 50%; -webkit-transform: translate(-50%, -50%);
    -ms-transform: translate(-50%, -50%); transform: translate(-50%, -50%); }
.notfound { max-width: 767px; width: 100%;line-height: 1.4; padding: 0px 15px; }
.notfound .notfound-404 { position: relative; height: 150px; line-height: 150px; margin-bottom: 25px; }
.notfound .notfound-404 h1 { font-family: 'Titillium Web', sans-serif; font-size: 186px;font-weight: 900;
    margin: 0px; text-transform: uppercase; background-size: cover; background-position: center; }
.notfound h2 { font-family: 'Titillium Web', sans-serif; font-size: 26px; font-weight: 700; margin: 0; }
.notfound p { font-family: 'Montserrat', sans-serif; font-size: 14px; font-weight: 500; margin-bottom: 0px; text-transform: uppercase; }
.notfound button {font-family: 'Titillium Web', sans-serif;display: inline-block; text-transform: uppercase;color: #fff;
text-decoration: none;border: none; background: #5c91fe;padding: 10px 40px;font-size: 14px;font-weight: 700;
border-radius: 1px; margin-top: 15px;-webkit-transition: 0.2s all;transition: 0.2s all; cursor: pointer;}
.notfound button:hover { opacity: 0.8; }
</style>
<script type="text/javascript">
function goBack(){ 
  window.history.back()
}
</script>
</head>

<body>
	<div id="notfound">
		<div class="notfound">
			<div class="notfound-404">
				<h1>404</h1>
			</div>
			<h2>Oops!</h2>
			<p>Sorry but the page you are looking for does not exist, have been removed. name changed or is temporarily unavailable</p>
			<button onclick="goBack()">Go To Homepage</button>
		</div>
	</div>
</body>

</html>

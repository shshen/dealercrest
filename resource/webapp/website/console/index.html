<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DealerCrest Console</title>
<!-- shared design-system — loaded ONCE here, available to every fragment -->
<link rel="stylesheet" href="/style/shared.css">
<style>
/* Shell-only layout styles */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --sidebar-w:220px; --sidebar-collapsed-w:56px;
  --topbar-h:56px;   --shadow-md:0 4px 16px rgba(0,0,0,.12);
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);font-size:14px;line-height:1.5;color:var(--text);background:var(--bg);display:flex;flex-direction:column}

/* Topbar */
.topbar{height:var(--topbar-h);background:#1a1c1e;display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;z-index:200}
.t-logo{display:flex;align-items:center;gap:9px;color:#fff;font-size:15px;font-weight:600;padding:6px 10px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;text-decoration:none}
.t-logo:hover{background:rgba(255,255,255,.08)}
.logo-mark{width:30px;height:30px;background:var(--green);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.logo-text{white-space:nowrap;overflow:hidden;transition:opacity .2s,max-width .22s;max-width:120px}
.t-sep{width:1px;height:20px;background:rgba(255,255,255,.15);flex-shrink:0}
.store-pill{display:flex;align-items:center;gap:8px;color:#fff;font-size:13px;font-weight:500;padding:6px 10px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);transition:background .15s}
.store-pill:hover{background:rgba(255,255,255,.13)}
.store-av{width:22px;height:22px;background:#3b5bdb;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.store-name{white-space:nowrap;overflow:hidden;transition:max-width .22s,opacity .2s;max-width:160px}
.t-gap{flex:1}
.t-btn{width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.07);color:rgba(255,255,255,.8);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;flex-shrink:0}
.t-btn:hover{background:rgba(255,255,255,.15)}
.t-btn svg{width:16px;height:16px;display:block}
.u-av{width:34px;height:34px;border-radius:50%;background:#3b5bdb;color:#fff;font-size:12px;font-weight:600;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid rgba(255,255,255,.2);transition:border-color .15s;flex-shrink:0}
.u-av:hover{border-color:rgba(255,255,255,.5)}

/* App body */
.app-body{display:flex;flex:1;overflow:hidden}

/* Sidebar —
   overflow:hidden on the container clips the sliding .nav-label text.
   .nav-item has NO overflow:hidden so SVG icons are never clipped.
   Icons live in a fixed 36×36 slot and never move. */
.sidebar{width:var(--sidebar-w);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .22s ease;position:relative;z-index:100}
.sidebar.collapsed{width:var(--sidebar-collapsed-w)}

.sb-head{display:flex;align-items:center;height:48px;padding:0 8px;gap:4px;border-bottom:1px solid var(--border-light);flex-shrink:0}
.sb-toggle{width:32px;height:32px;flex-shrink:0;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s}
.sb-toggle:hover{background:var(--bg);color:var(--text)}
.sb-toggle svg{width:15px;height:15px;display:block}
.sb-head-lbl{font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.6px;white-space:nowrap;overflow:hidden;transition:opacity .18s}
.sidebar.collapsed .sb-head-lbl{opacity:0}

.nav-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px;display:flex;flex-direction:column;gap:1px}

/* Nav item — no overflow:hidden, icon slot always visible */
.nav-item{display:flex;align-items:center;border-radius:var(--radius-sm);color:var(--text-2);font-size:13.5px;font-weight:500;cursor:pointer;border:none;background:transparent;width:100%;text-align:left;font-family:var(--font);transition:background .12s,color .12s;position:relative}
.nav-item:hover{background:var(--bg);color:var(--text)}
.nav-item.active{background:var(--green-light);color:var(--green);font-weight:600}

/* Fixed icon slot */
.nav-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-icon svg{width:17px;height:17px;display:block}

/* Label collapses via max-width */
.nav-label{white-space:nowrap;overflow:hidden;padding-right:8px;transition:max-width .22s ease,opacity .18s;max-width:150px}
.sidebar.collapsed .nav-label{max-width:0;opacity:0;padding-right:0}

/* Badge collapses */
.nav-badge{margin-left:auto;margin-right:8px;background:var(--green);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;line-height:16px;flex-shrink:0;white-space:nowrap;overflow:hidden;transition:opacity .18s,max-width .22s;max-width:40px}
.sidebar.collapsed .nav-badge{opacity:0;max-width:0;margin-right:0}

/* Tooltip when collapsed */
.sidebar.collapsed .nav-item:hover::after{content:attr(data-label);position:fixed;left:calc(var(--sidebar-collapsed-w) + 8px);background:#1a1c1e;color:#fff;font-size:12px;font-weight:500;padding:5px 10px;border-radius:var(--radius-sm);white-space:nowrap;z-index:9999;pointer-events:none;box-shadow:var(--shadow-md)}

.sb-divider{height:1px;background:var(--border-light);margin:4px 8px}

.sb-footer{padding:10px 8px;border-top:1px solid var(--border);flex-shrink:0;overflow:hidden}
.plan-card{background:var(--green-light);border:1px solid var(--green-border);border-radius:var(--radius);padding:12px;white-space:nowrap;overflow:hidden;transition:opacity .18s}
.sidebar.collapsed .plan-card{opacity:0;pointer-events:none}
.plan-lbl{font-size:10px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px}
.plan-name{font-size:13px;font-weight:600;color:var(--text);margin:3px 0 8px}
.plan-btn{width:100%;padding:6px 0;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:background .15s}
.plan-btn:hover{background:var(--green-hover)}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;position:relative}
#contentPane{flex:1;overflow-y:auto;overflow-x:hidden;background:var(--bg)}

/* Loading */
.loading-overlay{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:50;opacity:0;pointer-events:none;transition:opacity .15s}
.loading-overlay.show{opacity:1;pointer-events:all}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .65s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--text-3)}

/* Mobile backdrop */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90}
.sb-overlay.show{display:block}

/* ── Responsive ── */
@media(max-width:900px){
  .sidebar{width:var(--sidebar-collapsed-w)!important}
  .sidebar .nav-label{max-width:0!important;opacity:0!important;padding-right:0!important}
  .sidebar .nav-badge{opacity:0!important;max-width:0!important;margin-right:0!important}
  .sidebar .plan-card{opacity:0!important;pointer-events:none!important}
  .sidebar .sb-head-lbl{opacity:0!important}
  .store-name{max-width:0!important;opacity:0!important}
}
@media(max-width:600px){
  .sidebar{position:fixed!important;left:0;top:var(--topbar-h);bottom:0;width:var(--sidebar-w)!important;transform:translateX(-100%);transition:transform .22s ease!important;box-shadow:var(--shadow-md);z-index:150}
  .sidebar.mobile-open{transform:translateX(0)!important}
  .sidebar.mobile-open .nav-label{max-width:150px!important;opacity:1!important;padding-right:8px!important}
  .sidebar.mobile-open .nav-badge{opacity:1!important;max-width:40px!important;margin-right:8px!important}
  .sidebar.mobile-open .plan-card{opacity:1!important;pointer-events:auto!important}
  .sidebar.mobile-open .sb-head-lbl{opacity:1!important}
  .logo-text{max-width:0!important;opacity:0}
  .store-name{max-width:0!important;opacity:0!important}
}

::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#c4c4c4}
</style>
</head>
<body>

<header class="topbar">
  <button class="t-btn" onclick="toggleSidebar()" title="Toggle menu">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <div class="t-logo" onclick="navigate('dashboard')">
    <div class="logo-mark">DC</div>
    <span class="logo-text">DealerCrest</span>
  </div>
  <div class="t-sep"></div>
  <div class="store-pill">
    <div class="store-av">AT</div>
    <span class="store-name">AutoTrader SaaS</span>
    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.45)" stroke-width="2.5" stroke-linecap="round" style="flex-shrink:0;margin-left:2px"><polyline points="6 9 12 15 18 9"/></svg>
  </div>
  <div class="t-gap"></div>
  <div style="display:flex;align-items:center;gap:4px">
    <button class="t-btn" title="Notifications">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
    </button>
    <button class="t-btn" title="Help">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    </button>
    <div class="u-av">AT</div>
  </div>
</header>

<div class="sb-overlay" id="sbOverlay" onclick="closeMobileSidebar()"></div>

<div class="app-body">
  <nav class="sidebar" id="sidebar">
    <div class="sb-head">
      <button class="sb-toggle" onclick="toggleDesktopCollapse()" title="Collapse">
        <svg id="collapseIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <span class="sb-head-lbl">Navigation</span>
    </div>

    <div class="nav-list">
      <button class="nav-item active" data-page="dashboard" data-label="Dashboard" onclick="navigate('dashboard')">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg></span>
        <span class="nav-label">Dashboard</span>
      </button>

      <button class="nav-item" data-page="website" data-label="Website" onclick="navigate('website')">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></span>
        <span class="nav-label">Website</span>
      </button>

      <button class="nav-item" data-page="inventory" data-label="Inventory" onclick="navigate('inventory')">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span>
        <span class="nav-label">Inventory</span>
      </button>

      <button class="nav-item" data-page="leads" data-label="Leads" onclick="navigate('leads')">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg></span>
        <span class="nav-label">Leads</span>
        <span class="nav-badge">12</span>
      </button>

      <button class="nav-item" data-page="analytics" data-label="Analytics" onclick="navigate('analytics')">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
        <span class="nav-label">Analytics</span>
      </button>

      <div class="sb-divider"></div>

      <button class="nav-item" data-page="domains" data-label="Domains" onclick="navigate('domains')">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg></span>
        <span class="nav-label">Domains</span>
      </button>

      <button class="nav-item" data-page="billing" data-label="Billing" onclick="navigate('billing')">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></span>
        <span class="nav-label">Billing</span>
      </button>

      <button class="nav-item" data-page="settings" data-label="Settings" onclick="navigate('settings')">
        <span class="nav-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06-.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>
        <span class="nav-label">Settings</span>
      </button>
    </div>

    <div class="sb-footer">
      <div class="plan-card">
        <div class="plan-lbl">Current Plan</div>
        <div class="plan-name">Growth · 3 sites</div>
        <button class="plan-btn" onclick="navigate('billing')">Upgrade plan</button>
      </div>
    </div>
  </nav>

  <main class="main">
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
      <div class="loading-text" id="loadingText">Loading…</div>
    </div>
    <div id="contentPane"></div>
  </main>
</div>

<script>
const PAGES = {
  dashboard: {file:'pages/dashboard', label:'Dashboard'},
  website:   {file:'pages/website',   label:'Website'},
  inventory: {file:'pages/inventory', label:'Inventory'},
  leads:     {file:'pages/leads',     label:'Leads'},
  analytics: {file:'pages/analytics', label:'Analytics'},
  domains:   {file:'pages/domains',   label:'Domains'},
  billing:   {file:'pages/billing',   label:'Billing'},
  settings:  {file:'pages/settings',  label:'Settings'},
};

let currentPage = null;
let desktopCollapsed = false;

async function navigate(key, force) {
  const cfg = PAGES[key];
  if (!cfg) return;
  if (key === currentPage && !force) { closeMobileSidebar(); return; }

  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.page === key)
  );

  document.getElementById('loadingText').textContent = 'Loading ' + cfg.label + '…';
  document.getElementById('loadingOverlay').classList.add('show');

  try {
    const res = await fetch(cfg.file + '?t=' + Date.now());
    if (!res.ok) throw new Error('HTTP ' + res.status);

    const pane = document.getElementById('contentPane');
    pane.innerHTML = await res.text();   // Fragment: just <style> + content divs

    /* Re-execute any <script> tags in the fragment */
    pane.querySelectorAll('script').forEach(old => {
      const s = document.createElement('script');
      if (old.src) s.src = old.src; else s.textContent = old.textContent;
      old.replaceWith(s);
    });

    pane.scrollTop = 0;
    currentPage = key;
  } catch(err) {
    document.getElementById('contentPane').innerHTML =
      `<div style="padding:48px 32px">
         <p style="color:var(--danger);font-weight:600">Could not load ${cfg.label}</p>
         <p style="color:var(--text-3);font-size:13px;margin-top:4px">${err.message}</p>
       </div>`;
  } finally {
    document.getElementById('loadingOverlay').classList.remove('show');
  }
  closeMobileSidebar();
}

/* Called from website.html when user clicks Edit on a page card */
function navigateEditor(pageId, name, slug) {
  slug = slug || ({home:'/', 'inventory-page':'/inventory'}[pageId] || '/'+pageId);
  PAGES['_editor'] = {
    file: 'pages/editor?name='+encodeURIComponent(name)+'&slug='+encodeURIComponent(slug),
    label: 'Editing: '+name
  };
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.page === 'website')
  );
  history.replaceState(null, '', '#website');
  _navigateOrig('_editor', true);
  currentPage = 'website';
}

function toggleDesktopCollapse() {
  desktopCollapsed = !desktopCollapsed;
  if (window.innerWidth > 900)
    document.getElementById('sidebar').classList.toggle('collapsed', desktopCollapsed);
  document.getElementById('collapseIcon').innerHTML = desktopCollapsed
    ? '<polyline points="9 18 15 12 9 6"/>'
    : '<polyline points="15 18 9 12 15 6"/>';
}

function toggleSidebar() {
  window.innerWidth <= 600 ? toggleMobileSidebar() : toggleDesktopCollapse();
}
function toggleMobileSidebar() {
  const open = document.getElementById('sidebar').classList.toggle('mobile-open');
  document.getElementById('sbOverlay').classList.toggle('show', open);
}
function closeMobileSidebar() {
  if (window.innerWidth > 600) return;
  document.getElementById('sidebar').classList.remove('mobile-open');
  document.getElementById('sbOverlay').classList.remove('show');
}

window.addEventListener('resize', () => {
  const sb = document.getElementById('sidebar');
  if (window.innerWidth > 900) {
    sb.classList.toggle('collapsed', desktopCollapsed);
    sb.classList.remove('mobile-open');
    document.getElementById('sbOverlay').classList.remove('show');
  } else if (window.innerWidth > 600) {
    sb.classList.remove('collapsed','mobile-open');
    document.getElementById('sbOverlay').classList.remove('show');
  }
});

/* ── Hash-based routing ── */

// Update URL hash when navigating (without reload)
const _navigateOrig = navigate;
navigate = async function(key, force) {
  await _navigateOrig(key, force);
  // Only set hash for real named pages, not temp entries like _editor
  if (PAGES[key] && key !== '_editor') {
    history.replaceState(null, '', '#' + key);
  }
};

// Listen for browser back/forward
window.addEventListener('hashchange', () => {
  const key = location.hash.replace('#', '') || 'dashboard';
  if (PAGES[key]) navigate(key, true);
});

// Boot: read hash from URL or default to dashboard
const initPage = location.hash.replace('#', '') || 'dashboard';
navigate(PAGES[initPage] ? initPage : 'dashboard');
</script>
</body>
</html>

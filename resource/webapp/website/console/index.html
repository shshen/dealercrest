<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dealer SaaS Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/app.css"/>
</head>
<body>

<div class="app">

  <!-- ── Sidebar ── -->
  <div class="sb" id="sidebar">
    <div class="sb-logo" onclick="navigate('home')">P</div>
    <!-- Nav items injected by router.js → buildSidebar() -->
    <nav id="sidebar-nav"></nav>
    <div class="sb-bot">
      <button class="sb-btn" onclick="alert('Logout')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <div class="sb-tip">Logout</div>
      </button>
      <div class="av">AT</div>
    </div>
  </div>

  <!-- ── Main area ── -->
  <div class="mn">

    <!-- Header -->
    <div class="hd">
      <div class="hd-title" id="page-title">Dashboard</div>
      <div class="hd-srch">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input placeholder="Search anything..."/>
      </div>
      <div class="icon-btn" id="hd-chat-btn" onclick="toggleChat()" title="Messages">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        <div class="ndot" id="hd-chat-dot"></div>
      </div>
      <div class="icon-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
        <div class="ndot"></div>
      </div>
      <div class="av">AT</div>
    </div>

    <!-- ── Page content — router injects here ── -->
    <div class="ct" id="main-ct"></div>

    <!-- Page Builder (full-screen takeover, used by website page) -->
    <div id="page-builder" style="display:none">
      <div class="bl-bar">
        <span class="bl-back" onclick="closeBuilder()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
          </svg>
          Website
        </span>
        <input class="bl-pagename" id="bl-pagename" value="Page"/>
        <div class="bl-bar-title" id="bl-bar-url">/</div>
        <button class="icon-btn" id="bl-toggle-left" onclick="toggleLeftPanel()" title="Toggle Blocks" style="width:34px;height:34px;flex-shrink:0"></button>
        <div class="vp-btns">
          <button class="vp-btn on" onclick="setViewport('desktop',this)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </button>
          <button class="vp-btn" onclick="setViewport('tablet',this)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2"/></svg>
          </button>
          <button class="vp-btn" onclick="setViewport('mobile',this)">
            <svg width="10" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2"/></svg>
          </button>
        </div>
        <button class="btn btn-s btn-sm" onclick="previewPage()">Preview</button>
        <button class="btn btn-p btn-sm" onclick="savePageFromBuilder()">Publish</button>
        <button class="icon-btn" id="bl-toggle-right" onclick="toggleRightPanel()" title="Toggle Properties" style="width:34px;height:34px;flex-shrink:0"></button>
      </div>
      <div class="bl-body">
        <div class="bl-panel" id="bl-left-panel" style="display:flex;flex-direction:column">
          <div class="bl-panel-h">Blocks
            <button class="bl-panel-toggle" onclick="toggleLeftPanel()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
          </div>
          <div id="bl-lib-list" style="flex:1;overflow-y:auto;padding:10px"></div>
          <div id="bl-tmpl-picker" style="display:none;flex-direction:column;height:100%;overflow:hidden"></div>
        </div>
        <div class="bl-canvas-outer">
          <div class="bl-canvas-wrap" id="bl-canvas-wrap">
            <div class="bl-canvas desktop" id="bl-canvas"></div>
          </div>
        </div>
        <div class="bl-props-panel" id="bl-right-panel">
          <div class="bl-panel-h">Properties
            <button class="bl-panel-toggle" onclick="toggleRightPanel()">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
          <div class="bl-props-body" id="bl-props-body">
            <div class="no-sel">Click a block on the canvas to edit its properties</div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /mn -->
</div><!-- /app -->

<!-- ── Chat bubble + drawer ── -->
<button class="chat-bubble" id="chat-bubble" onclick="toggleChat()"></button>
<div class="chat-drawer" id="chat-drawer">
  <div class="chat-drawer-h">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
    </svg>
    <h3>Messages</h3>
    <div id="chat-unread-badge" style="background:var(--red);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px;display:none"></div>
    <div style="margin-left:auto;display:flex;gap:6px">
      <button class="btn btn-s btn-sm">New Chat</button>
      <button class="icon-btn" onclick="closeChatDrawer()" style="width:28px;height:28px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>
  <div class="chat-body">
    <div class="conv-list" id="conv-list"></div>
    <div class="chat-win" id="chat-win-content"></div>
  </div>
</div>

<!-- ── Modal ── -->
<div class="modal-bg" id="modal-overlay" style="display:none">
  <div class="modal">
    <div class="modal-h">
      <h2 id="modal-title">Modal</h2>
      <button class="icon-btn" onclick="closeModal()" style="width:28px;height:28px">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-f">
      <button class="btn btn-s" onclick="closeModal()">Cancel</button>
      <button class="btn btn-p" id="modal-save-btn" onclick="modalSave()">Save</button>
    </div>
  </div>
</div>

<!-- ── Toast ── -->
<div id="toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--grn);color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;opacity:0;transition:all .25s;z-index:9999;pointer-events:none;white-space:nowrap"></div>

<!-- ── Core scripts (order matters) ── -->
<script src="js/shared.js"></script>   <!-- icons, svgIcon, btn, modal, toast -->
<script src="js/data.js"></script>     <!-- CARS, LEADS, TASKS, PORTALS, etc. -->
<script src="js/chat.js"></script>     <!-- chat drawer + conversations -->
<script src="js/router.js"></script>   <!-- navigate(), loadPage(), init() -->

</body>
</html>

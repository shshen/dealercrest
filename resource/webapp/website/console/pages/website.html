<style>
.pages-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.page-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:border-color .15s,box-shadow .15s}
.page-card:hover{border-color:var(--green);box-shadow:0 0 0 3px var(--green-light)}
.page-thumb{height:150px;background:var(--bg);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.thumb-inner{width:78%;height:78%;background:#fff;border-radius:4px;box-shadow:0 2px 8px rgba(0,0,0,.1);overflow:hidden;display:flex;flex-direction:column;pointer-events:none}
.ti-header{height:14px;background:#1a1c1e;flex-shrink:0}
.ti-body{flex:1;padding:6px;display:flex;flex-direction:column;gap:4px}
.ti-bar{height:5px;border-radius:2px;background:var(--border)}
.ti-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:3px;margin-top:2px}
.ti-block{height:24px;background:var(--bg);border-radius:2px}
.ti-hero{flex:1;background:linear-gradient(135deg,#667eea 60%,#764ba2);border-radius:2px}
.status-pip{position:absolute;top:10px;right:10px}
.page-card-body{padding:14px 16px;flex:1}
.page-card-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px}
.page-card-url{font-size:12px;color:var(--text-3);font-family:monospace;margin-bottom:8px}
.page-card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.page-card-date{font-size:12px;color:var(--text-3)}
.page-card-footer{padding:10px 16px;border-top:1px solid var(--border-light);background:var(--bg);display:flex;align-items:center;gap:8px}
.page-card-footer .btn{flex:1;justify-content:center}
.icon-btn{width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text-2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s,color .12s;flex-shrink:0}
.icon-btn:hover{background:var(--bg);color:var(--text)}
.icon-btn svg{width:14px;height:14px;display:block}
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search-wrap{position:relative;display:flex;align-items:center}
.search-wrap svg{position:absolute;left:10px;width:14px;height:14px;color:var(--text-3);pointer-events:none}
.search-wrap input{padding:8px 12px 8px 32px;border:1px solid var(--border);border-radius:var(--radius-sm);font-family:var(--font);font-size:13px;color:var(--text);background:var(--surface);outline:none;transition:border-color .15s;width:220px}
.search-wrap input:focus{border-color:var(--green)}
.page-count{margin-left:auto;font-size:13px;color:var(--text-3);font-weight:500}
@media(max-width:600px){.pages-grid{grid-template-columns:1fr}.search-wrap input{width:160px}}
</style>

<script>
function filterPages(q) {
  const cards = document.querySelectorAll('#pagesGrid .page-card');
  let n = 0;
  cards.forEach(c => {
    const show = c.dataset.name.toLowerCase().includes(q.toLowerCase());
    c.style.display = show ? '' : 'none';
    if (show) n++;
  });
  document.getElementById('pageCount').textContent = n + ' page' + (n !== 1 ? 's' : '');
}
</script>

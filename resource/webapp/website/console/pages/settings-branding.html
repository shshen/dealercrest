<!-- fragment: pages/settings-branding.html -->
<div class="page">
  <div class="page-header">
    <div class="breadcrumb">
      <span class="breadcrumb-parent" onclick="navigate('settings')">Settings</span>
      <span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-current">Branding</span>
    </div>
    <div class="page-header-actions">
      <button class="btn btn-secondary" onclick="navigate('settings')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSection(this)">
        <svg width="14" height="14"><use href="#icon-check"/></svg>
        <span class="btn-label">Save changes</span>
      </button>
    </div>
  </div>
  <div class="page-body">
    <div class="card" style="margin-bottom:16px">
      <div class="card-header"><div class="card-title">Logo</div></div>
      <div class="card-body">
        <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
          <div style="width:80px;height:80px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:28px">🚗</div>
          <div><button class="btn btn-secondary btn-sm" style="margin-bottom:8px">Upload logo</button><div style="font-size:12px;color:var(--text-3)">PNG, SVG or JPG · Max 2MB · Recommended 400×120px</div></div>
        </div>
      </div>
    </div>
    <div class="card" >
      <div class="card-header"><div class="card-title">Brand Colors</div></div>
      <div class="card-body">
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Primary Color</label><div style="display:flex;gap:8px;align-items:center"><input type="color" value="#008060" style="width:40px;height:36px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;padding:2px"><input type="text" class="form-input" value="#008060" style="font-family:monospace"></div></div>
          <div class="form-group"><label class="form-label">Accent Color</label><div style="display:flex;gap:8px;align-items:center"><input type="color" value="#1a1c1e" style="width:40px;height:36px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;padding:2px"><input type="text" class="form-input" value="#1a1c1e" style="font-family:monospace"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
function saveSection(btn) {
  const orig = btn.innerHTML; btn.disabled = true;
  btn.innerHTML = '<span class="btn-label">Saving…</span>';
  setTimeout(() => {
    btn.innerHTML = '<svg width="14" height="14"><use href="#icon-check"/></svg><span class="btn-label"> Saved</span>';
    setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 1500);
  }, 700);
}
</script>

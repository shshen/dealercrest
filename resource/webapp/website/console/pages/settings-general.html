<!-- fragment: pages/settings-general.html -->
<div class="page">
  <div class="page-header">
    <div class="breadcrumb">
      <span class="breadcrumb-parent" onclick="navigate('settings')">Settings</span>
      <span class="breadcrumb-sep">›</span>
      <span class="breadcrumb-current">General</span>
    </div>
    <div class="page-header-actions">
      <button class="btn btn-secondary" onclick="navigate('settings')">Cancel</button>
      <button class="btn btn-primary" onclick="saveSection(this)">
        <svg width="14" height="14"><use href="#icon-check"/></svg>
        <span class="btn-label">Save changes</span>
      </button>
    </div>
  </div>
  <div class="page-body">
    <div class="card" >
      <div class="card-header"><div class="card-title">Dealership Info</div></div>
      <div class="card-body">
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Dealership Name</label><input type="text" class="form-input" value="AutoTrader SaaS"></div>
          <div class="form-group"><label class="form-label">Phone Number</label><input type="tel" class="form-input" value="(801) 555-0100"></div>
          <div class="form-group"><label class="form-label">Email Address</label><input type="email" class="form-input" value="info@autotrader.com"></div>
          <div class="form-group"><label class="form-label">Time Zone</label><select class="form-select"><option selected>America/Denver (MT)</option><option>America/Los_Angeles (PT)</option><option>America/Chicago (CT)</option><option>America/New_York (ET)</option></select></div>
          <div class="form-group" style="grid-column:1/-1"><label class="form-label">Address</label><input type="text" class="form-input" value="1234 Auto Park Dr, Salt Lake City, UT 84101"></div>
          <div class="form-group"><label class="form-label">Business Hours</label><input type="text" class="form-input" value="Mon–Sat 9am–7pm, Sun 11am–5pm"></div>
          <div class="form-group"><label class="form-label">Website</label><input type="text" class="form-input" value="https://dealercrest.com"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
function saveSection(btn) {
  const orig = btn.innerHTML; btn.disabled = true;
  btn.innerHTML = '<span class="btn-label">Saving…</span>';
  setTimeout(() => {
    btn.innerHTML = '<svg width="14" height="14"><use href="#icon-check"/></svg><span class="btn-label"> Saved</span>';
    setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 1500);
  }, 700);
}
</script>

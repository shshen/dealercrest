<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title th:text="${page.title + ' | ' + dealer.name}">Page</title>
  <style th:inline="text">
    :root {
      --color-primary: [(${dealer.primaryColor})];
      --color-accent:  [(${dealer.accentColor})];
      --color-surface: #f8f9fa;
      --color-muted:   #666;
      --radius-card:   12px;
      --shadow-card:   0 2px 16px rgba(0,0,0,0.08);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',system-ui,sans-serif;color:#1a1a1a}
    img{max-width:100%;display:block} a{text-decoration:none;color:inherit}
    .btn{display:inline-block;padding:12px 28px;border-radius:6px;font-weight:600;font-size:.95rem;cursor:pointer;transition:opacity .2s}
    .btn:hover{opacity:.88}
    .btn-primary{background:var(--color-primary);color:#fff}
    .btn-outline{border:2px solid #fff;color:#fff}
    .btn-accent{background:var(--color-accent);color:var(--color-primary)}
    .btn-sm{padding:8px 16px;font-size:.85rem}
    .btn-lg{padding:16px 40px;font-size:1.05rem}
    .site-header{background:var(--color-primary);color:#fff;position:sticky;top:0;z-index:100}
    .header-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;align-items:center;gap:32px;height:68px}
    .logo img{height:40px;width:auto}
    .main-nav{flex:1}.main-nav ul{list-style:none;display:flex;gap:28px}
    .main-nav a{color:rgba(255,255,255,.85);font-size:.95rem;font-weight:500}
    .main-nav a:hover{color:var(--color-accent)}
    .header-cta{display:flex;align-items:center;gap:16px}
    .phone{color:var(--color-accent);font-weight:600;white-space:nowrap}
    .hero-block{position:relative;background-size:cover;background-position:center;min-height:540px;display:flex;align-items:center}
    .hero-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.72),rgba(0,0,0,.3))}
    .hero-content{position:relative;max-width:1280px;margin:0 auto;padding:80px 24px;color:#fff}
    .hero-content h1{font-size:3rem;font-weight:800;line-height:1.1;margin-bottom:20px}
    .hero-sub{font-size:1.2rem;max-width:580px;margin-bottom:36px;opacity:.9;line-height:1.6}
    .hero-actions{display:flex;gap:16px;flex-wrap:wrap}
    .vehicle-list-block{padding:72px 24px;max-width:1280px;margin:0 auto}
    .block-header{text-align:center;margin-bottom:48px}
    .block-header h2{font-size:2rem;font-weight:700;margin-bottom:10px}
    .block-subtitle{color:var(--color-muted);font-size:1.05rem}
    .vehicle-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:28px}
    .vehicle-card{border-radius:var(--radius-card);overflow:hidden;box-shadow:var(--shadow-card);background:#fff;transition:transform .2s,box-shadow .2s}
    .vehicle-card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,.13)}
    .vehicle-image{position:relative}
    .vehicle-image img{width:100%;height:200px;object-fit:cover}
    .badge{position:absolute;top:12px;left:12px;background:var(--color-accent);color:var(--color-primary);padding:4px 10px;border-radius:4px;font-size:.78rem;font-weight:700}
    .condition{position:absolute;top:12px;right:12px;padding:4px 10px;border-radius:4px;font-size:.78rem;font-weight:700;color:#fff}
    .condition-new{background:#15803d}.condition-used{background:#b45309}
    .vehicle-info{padding:20px}
    .vehicle-info h3{font-size:1.1rem;font-weight:700;margin-bottom:4px}
    .trim{color:var(--color-muted);font-size:.9rem;margin-bottom:6px}
    .mileage{color:var(--color-muted);font-size:.88rem;margin-bottom:8px}
    .price{font-size:1.4rem;font-weight:800;color:var(--color-primary);margin-bottom:16px}
    .card-actions{text-align:center}
    .view-all{text-align:center;margin-top:48px}
    .cta-banner{padding:64px 24px}
    .cta-dark{background:var(--color-primary);color:#fff}
    .cta-light{background:var(--color-surface)}
    .cta-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:32px;flex-wrap:wrap}
    .cta-text h2{font-size:1.8rem;font-weight:700;margin-bottom:10px}
    .cta-text p{opacity:.85;max-width:520px;line-height:1.6}
    .map-block{display:grid;grid-template-columns:1fr 380px;max-width:1280px;margin:0 auto;padding:72px 24px;gap:48px;align-items:start}
    .map-embed iframe{border-radius:var(--radius-card);display:block}
    .map-info h2{font-size:1.6rem;font-weight:700;margin-bottom:12px}
    .map-address{color:var(--color-muted);margin-bottom:8px}
    .map-phone{color:var(--color-primary);font-weight:700;font-size:1.1rem}
    .hours-table{margin-top:24px;border-top:1px solid #eee;padding-top:20px}
    .hours-table h4{font-size:.85rem;text-transform:uppercase;letter-spacing:.06em;color:var(--color-muted);margin-bottom:12px}
    .hours-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;font-size:.95rem}
    .hours-days{font-weight:500}.hours-time{color:var(--color-muted)}
    .site-footer{background:#111;color:rgba(255,255,255,.8)}
    .footer-top{max-width:1280px;margin:0 auto;padding:60px 24px;display:grid;grid-template-columns:1.5fr repeat(3,1fr);gap:48px}
    .footer-brand img{height:36px;margin-bottom:16px;filter:brightness(0) invert(1)}
    .footer-address{font-size:.9rem;line-height:1.7;margin-bottom:8px}
    .footer-phone{color:var(--color-accent);font-weight:600}
    .footer-col h4{color:#fff;font-size:.85rem;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px}
    .footer-col ul{list-style:none}.footer-col li{margin-bottom:10px}
    .footer-col a{font-size:.9rem;opacity:.7;transition:opacity .15s}
    .footer-col a:hover{opacity:1}
    .footer-bottom{border-top:1px solid rgba(255,255,255,.1);max-width:1280px;margin:0 auto;padding:24px}
    .copyright{font-size:.85rem;opacity:.5}
    .disclaimer{font-size:.78rem;opacity:.4;margin-top:6px}

    /* Result count */
    .result-count{color:var(--color-muted);font-size:.95rem;margin-top:8px}
    .result-count strong{color:#1a1a1a}

    /* Pagination */
    .pagination{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:48px;flex-wrap:wrap}
    .page-btn{display:inline-flex;align-items:center;justify-content:center;min-width:40px;height:40px;padding:0 12px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#1a1a1a;font-size:.9rem;font-weight:500;cursor:pointer;transition:all .15s;text-decoration:none}
    .page-btn:hover:not(.disabled):not(.page-current){background:var(--color-primary);color:#fff;border-color:var(--color-primary)}
    .page-current{background:var(--color-primary);color:#fff;border-color:var(--color-primary);font-weight:700}
    .page-prev,.page-next{padding:0 16px;font-weight:600}
    .disabled{opacity:.4;cursor:not-allowed}
    .page-ellipsis{color:var(--color-muted);font-size:.9rem;padding:0 4px;line-height:40px}
    .page-summary{margin-left:12px;color:var(--color-muted);font-size:.9rem}
    .page-summary strong{color:#1a1a1a}
  </style>
  <template th:replace="head"></template>
</head>
<body>
<div th:replace="body"></div>
</body>
</html>
